<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井澤鉄工所 社内日程表</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --line:#e3e8ef; --ink:#1f2937; --sub:#6b7280;
    --accent:#2563eb; --factory:#0ea5e9; --rest:#9ca3af; --shadow:0 1px 3px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
       background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:30;background:#0f172a;color:#fff;
         padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.5px}
  header .who{font-size:11px;color:#94a3b8}
  .tabs{margin-left:auto;display:flex;gap:6px;background:#1e293b;padding:4px;border-radius:10px}
  .tabs button{border:0;background:transparent;color:#cbd5e1;font-size:13px;font-weight:600;
               padding:8px 14px;border-radius:7px;cursor:pointer;transition:.15s}
  .tabs button.on{background:var(--accent);color:#fff}
  .toolbar{background:var(--panel);border-bottom:1px solid var(--line);padding:8px 14px;
           display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:48px;z-index:20}
  .toolbar .nav{display:flex;align-items:center;gap:6px}
  .toolbar button.ghost{border:1px solid var(--line);background:#fff;border-radius:8px;
        padding:6px 12px;cursor:pointer;font-size:14px;font-weight:600}
  .toolbar button.ghost:hover{background:#f1f5f9}
  .toolbar .cur{font-size:15px;font-weight:700;min-width:130px;text-align:center}
  .toolbar .spacer{flex:1}
  .roletag{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px}
  .roletag.editor{background:#dcfce7;color:#166534}.roletag.viewer{background:#e0e7ff;color:#3730a3}
  main{padding:14px;max-width:1280px;margin:0 auto}
  .week{background:var(--panel);border:1px solid var(--line);border-radius:14px;
        box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
  .week.scroll{overflow-x:auto}
  .week-h{padding:8px 12px;font-size:12px;font-weight:700;color:var(--sub);
          background:#f8fafc;border-bottom:1px solid var(--line)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr)}
  /* 現場ビュー：現場ごとに横一列のレーン */
  .wgrid{display:grid;grid-template-columns:repeat(7,minmax(102px,1fr));min-width:770px}
  .dhead{font-size:13px;font-weight:700;text-align:center;padding:7px 4px;background:#f8fafc;
         border-left:1px solid var(--line);border-bottom:2px solid var(--line)}
  .dhead:first-child{border-left:0}
  .dhead.sun,.dhead.sun .wd{color:#dc2626}.dhead.sat,.dhead.sat .wd{color:#2563eb}
  .dhead.today{background:#fff7ed;box-shadow:inset 0 -3px 0 #f59e0b}
  .dhead .wd{font-size:11px;color:var(--sub);font-weight:600}
  .lc{border-left:1px solid var(--line);border-top:1px solid var(--line);
      padding:4px;cursor:pointer;min-height:30px;background:#fff;transition:.1s}
  .lc.ro{cursor:default}
  .lc:hover{background:#f8fbff;box-shadow:inset 0 0 0 2px #dbeafe}
  .lc.ro:hover{box-shadow:none;background:#fff}
  .lc.off{background:#fafbfc}
  .lc.today{background:#fffdf5}
  .site{border-radius:8px;padding:4px 6px;font-size:11.5px;line-height:1.35;color:#fff}
  .site .nm{font-weight:700;display:block;margin-bottom:2px;font-size:11px}
  .chip{display:inline-block;background:rgba(255,255,255,.22);border-radius:6px;
        padding:1px 5px;margin:1px 2px 1px 0;font-size:11px}
  .chip.spot{outline:1px dashed rgba(255,255,255,.7)}
  .chip[draggable="true"]{cursor:grab}
  .chip[draggable="true"]:active{cursor:grabbing}
  .lc.dragover{box-shadow:inset 0 0 0 2px #f59e0b !important;background:#fff7ed !important}
  .dndhint{font-size:11.5px;color:#0369a1;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:7px 10px;margin-bottom:10px}
  .site{position:relative}
  .cardx{position:absolute;top:1px;right:1px;width:16px;height:16px;line-height:15px;text-align:center;
         background:rgba(0,0,0,.32);color:#fff;border-radius:50%;font-size:12px;font-weight:700;cursor:pointer}
  .cardx:hover{background:#b91c1c}
  .lc.rest{background:#fff7ed;border-top:2px solid #fed7aa}
  .restbox{font-size:11px;color:#9a3412;font-weight:700}
  .restbox b{font-size:13px}
  .lc.fac .chip,.lc.rest .chip{background:#dbeafe;color:#1e3a8a;outline:none}
  .lc.rest .chip{background:#fde4cf;color:#9a3412}
  .lc.fac .chip.spot,.lc.rest .chip.spot{outline:1px dashed #94a3b8}
  .lc.fac{background:#f0fdff;border-top:2px solid #bae6fd}
  .lc.fac.off{background:#f8fafc}
  .facbox2{font-size:11px;color:#0369a1;font-weight:700}
  .facbox2 b{font-size:13px}
  .facn{font-weight:500;color:#334155;font-size:11px;line-height:1.35;margin-top:2px}
  .count{font-size:11px;color:var(--sub)}
  .cellbox{min-height:78px;border-right:1px solid var(--line);border-top:1px solid var(--line);
           padding:6px;font-size:12px}
  .cellbox.today{background:#fffdf5;box-shadow:inset 0 0 0 2px #fde68a}
  .mh{font-size:13px;font-weight:700;text-align:center;padding:7px 4px;background:#f8fafc;
      border-bottom:1px solid var(--line);border-left:1px solid var(--line)}
  .mh.sun{color:#dc2626}.mh.sat{color:#2563eb}
  .badge{display:inline-block;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:700;color:#fff;margin-top:4px}
  .badge.factory{background:var(--factory)}.badge.rest{background:var(--rest)}
  .names{margin-top:4px;font-size:11.5px;color:var(--ink);line-height:1.4}
  .dnum{font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .wd{font-size:11px;color:var(--sub)}
  .sun .dnum{color:#dc2626}.sat .dnum{color:#2563eb}
  .people-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .ptag{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;
        font-size:13px;font-weight:600;cursor:pointer}
  .ptag.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ptag.spot{border-style:dashed}
  .summary{display:flex;gap:14px;margin:6px 0 0}
  .summary div{font-size:13px}.summary b{font-size:18px}
  .ov{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:none;
      align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto}
  .ov.on{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:520px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .modal h3{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:15px}
  .modal .body{padding:14px 16px;max-height:62vh;overflow:auto}
  .modal .foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .arow{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px}
  .arow input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;margin-top:4px}
  .arow label{font-size:11px;color:var(--sub);font-weight:700}
  .btn{border:0;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}.btn.gray{background:#eef2f7;color:#334155}
  .btn.danger{background:#fee2e2;color:#b91c1c}
  .lnk{color:var(--accent);font-size:13px;cursor:pointer;font-weight:600;background:none;border:0}
  .typesel{display:flex;align-items:center;gap:8px;justify-content:space-between;
           padding:8px 0;border-bottom:1px dashed var(--line)}
  .typesel select{border:1px solid var(--line);border-radius:8px;padding:6px;font-size:13px}
  .note{font-size:11.5px;color:var(--sub);background:#fffbeb;border:1px solid #fde68a;
        border-radius:8px;padding:8px 10px;margin-bottom:10px}
  /* login */
  #login{position:fixed;inset:0;background:#0f172a;z-index:80;display:flex;align-items:center;justify-content:center;padding:16px}
  .lcard{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .lcard h2{margin:0 0 4px;font-size:18px}
  .lcard p{margin:0 0 18px;color:var(--sub);font-size:13px}
  .lcard label{font-size:12px;font-weight:700;color:#334155}
  .lcard input{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px;font-size:15px;margin:5px 0 14px}
  .lcard .btn{width:100%;padding:12px}
  .lerr{color:#b91c1c;font-size:12.5px;min-height:18px;margin-top:8px}
  .splash{color:#cbd5e1;font-size:13px}
  #app{display:none}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;
         padding:10px 18px;border-radius:10px;font-size:13px;z-index:90;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
  .memrow{display:flex;align-items:center;gap:8px;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .memrow .em{font-size:13px}
  @media(max-width:760px){header h1{font-size:14px}.tabs button{padding:7px 10px}}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login">
  <div class="lcard">
    <h2>井澤鉄工所 社内日程表</h2>
    <p id="loginMsg">登録済みのメールとパスワードでログイン</p>
    <div id="loginForm" style="display:none">
      <label>メールアドレス</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@example.com">
      <label>パスワード</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="パスワード">
      <button class="btn primary" id="loginBtn">ログイン</button>
      <div class="lerr" id="lerr"></div>
    </div>
    <div id="loginSplash" class="splash">読み込み中…</div>
  </div>
</div>

<!-- ===== アプリ本体 ===== -->
<div id="app">
<header>
  <h1>井澤鉄工所　社内日程表</h1>
  <span class="who" id="who"></span>
  <div class="tabs">
    <button data-v="site" class="on">現場ビュー</button>
    <button data-v="person">個人ビュー</button>
    <button data-v="factory">工場ビュー</button>
  </div>
</header>
<div class="toolbar">
  <div class="nav">
    <button class="ghost" id="prev">‹</button>
    <div class="cur" id="curMonth"></div>
    <button class="ghost" id="next">›</button>
    <button class="ghost" id="today">今日</button>
  </div>
  <div id="ctx" class="people-row"></div>
  <div class="spacer"></div>
  <span class="roletag" id="roletag"></span>
  <button class="ghost" id="undo" style="display:none">↩ 元に戻す</button>
  <button class="ghost" id="gear" style="display:none">⚙ 人員設定</button>
  <button class="ghost" id="importBtn" style="display:none">⬆ 取込</button>
  <button class="ghost" id="memberBtn" style="display:none">👥 メンバー</button>
  <button class="ghost" id="logout">ログアウト</button>
</div>
<main id="main"></main>
</div>

<!-- 予定編集 -->
<div class="ov" id="ov"><div class="modal">
  <h3 id="ovTitle">予定を編集</h3>
  <div class="body" id="ovBody"></div>
  <div class="foot"><button class="btn gray" id="ovCancel">閉じる</button><button class="btn primary" id="ovSave">保存</button></div>
</div></div>
<!-- 人員設定 -->
<div class="ov" id="ovs"><div class="modal">
  <h3>人員設定（種別）</h3>
  <div class="body" id="ovsBody"></div>
  <div class="foot"><button class="btn gray" id="ovsClose">閉じる</button></div>
</div></div>
<!-- メンバー管理 -->
<div class="ov" id="ovm"><div class="modal">
  <h3>メンバー管理（編集者・閲覧者）</h3>
  <div class="body" id="ovmBody"></div>
  <div class="foot"><button class="btn gray" id="ovmClose">閉じる</button></div>
</div></div>
<!-- 取込 -->
<div class="ov" id="ovi"><div class="modal">
  <h3>データ取込（JSON）</h3>
  <div class="body" id="oviBody"></div>
  <div class="foot"><button class="btn gray" id="oviClose">閉じる</button></div>
</div></div>

<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, getDoc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ====== ここにFirebaseの設定を貼り付け（Step1で取得）======
const firebaseConfig = {
  apiKey: "AIzaSyDiAjaRRwn9aZyVYl1Asof3Qrs_PMDUu98",
  authDomain: "izawa-schedule.firebaseapp.com",
  projectId: "izawa-schedule",
  storageBucket: "izawa-schedule.firebasestorage.app",
  messagingSenderId: "377531473178",
  appId: "1:377531473178:web:b95da9a0670618967560a3",
  measurementId: "G-45JZB6CNV7"
};
// ==========================================================

const TYPES={A:"A 社員・常駐（現場＋工場）",B:"B 常駐（工場のみ・土日休）",C:"C 外注（現場のみ）"};
const FAC='__FAC__', OFF='__OFF__';
const WD=['日','月','火','水','木','金','土'];
let app,auth,db, user=null, role=null;
let data={days:[]}, ptype={}, editors=[], viewers=[];
let view="site", curPerson=null, cursor=null, started=false;

// ---------- boot ----------
try{
  app=initializeApp(firebaseConfig); auth=getAuth(app); db=getFirestore(app);
  onAuthStateChanged(auth, onAuth);
}catch(e){
  document.getElementById('loginSplash').textContent='設定が未完了です（firebaseConfig 未設定）。';
}

async function onAuth(u){
  const splash=document.getElementById('loginSplash'), form=document.getElementById('loginForm');
  if(!u){ user=null; role=null; splash.style.display='none'; form.style.display='block';
    document.getElementById('app').style.display='none'; document.getElementById('login').style.display='flex'; return; }
  user=u;
  // 権限判定：config/app を読む
  splash.style.display='block'; form.style.display='none'; splash.textContent='権限を確認中…';
  let cfg=null;
  try{ const s=await getDoc(doc(db,'config','app')); cfg=s.exists()?s.data():null; }
  catch(e){ cfg=null; }
  const email=(u.email||'').toLowerCase();
  const ed=((cfg&&cfg.editors)||[]).map(x=>String(x).toLowerCase());
  const vi=((cfg&&cfg.viewers)||[]).map(x=>String(x).toLowerCase());
  if(ed.includes(email)) role='editor';
  else if(vi.includes(email)) role='viewer';
  else role=null;
  if(!role){
    splash.innerHTML='このアカウントには閲覧権限がありません。<br>管理者にメールアドレスの登録を依頼してください。<br><br>'+
      '<button class="btn gray" id="boutLogout">別アカウントでログイン</button>';
    document.getElementById('boutLogout').onclick=()=>signOut(auth);
    return;
  }
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('who').textContent=email;
  const rt=document.getElementById('roletag');
  rt.textContent= role==='editor'?'編集者':'閲覧者'; rt.className='roletag '+(role==='editor'?'editor':'viewer');
  document.getElementById('gear').style.display = role==='editor'?'':'none';
  document.getElementById('importBtn').style.display = role==='editor'?'':'none';
  document.getElementById('memberBtn').style.display = role==='editor'?'':'none';
  if(!started){ started=true; subscribe(); }
}

// ---------- realtime subscribe ----------
function subscribe(){
  onSnapshot(collection(db,'days'), snap=>{
    const days=[]; snap.forEach(d=>days.push(d.data()));
    days.sort((a,b)=>a.date<b.date?-1:1);
    data.days=days;
    if(!cursor){ const months=monthsList(); const t=todayIso().slice(0,7);
      cursor = months.includes(t)?t:(months[0]||t); }
    render();
  });
  onSnapshot(doc(db,'config','app'), s=>{
    const c=s.exists()?s.data():{};
    ptype=c.ptype||{}; editors=c.editors||[]; viewers=c.viewers||[];
    render();
  });
}

// ---------- login form ----------
document.getElementById('loginBtn').onclick=async()=>{
  const em=document.getElementById('email').value.trim(), pw=document.getElementById('pass').value;
  const er=document.getElementById('lerr'); er.textContent='';
  try{ await signInWithEmailAndPassword(auth, em, pw); }
  catch(e){ er.textContent='ログインできません（メール/パスワードをご確認ください）'; }
};
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click()});
document.getElementById('logout').onclick=()=>signOut(auth);

// ---------- helpers ----------
function todayIso(){return new Date().toLocaleDateString('sv').slice(0,10)}
function monthOf(iso){return iso.slice(0,7)}
function ymd(iso){const[y,m,d]=iso.split('-').map(Number);return{y,m,d}}
function dayMap(){const m={};data.days.forEach(d=>m[d.date]=d);return m}
function jsWd(iso){return new Date(iso+'T00:00:00').getDay()}
function monthsList(){return [...new Set(data.days.map(d=>monthOf(d.date)))].sort()}
function shiftMonth(ym,delta){let[y,m]=ym.split('-').map(Number);m+=delta;while(m<1){m+=12;y--}while(m>12){m-=12;y++}return y+'-'+String(m).padStart(2,'0')}
function defType(p){ if(/^センバ/.test(p))return 'A'; if(/^西若/.test(p))return 'C';
  if(/\d$/.test(p)||/応援|新興|α/.test(p))return 'C'; return 'A'; }
function tOf(p){return ptype[p]||defType(p)}
function isWeekdayDate(iso){const w=jsWd(iso);return w>=1&&w<=5}
function isWorkingDay(iso){const d=dayMap()[iso];return !!(d&&d.assignments&&d.assignments.length)}
function offOf(iso){const d=dayMap()[iso];return new Set(d&&d.off?d.off:[])}
function onSiteSet(iso){const d=dayMap()[iso];const s=new Set();(d?d.assignments:[]).forEach(a=>a.people.forEach(p=>s.add(p)));return s}
function allPeople(){const s=new Set();data.days.forEach(d=>d.assignments.forEach(a=>a.people.forEach(p=>s.add(p))));Object.keys(ptype).forEach(p=>s.add(p));return [...s].sort((a,b)=>a.localeCompare(b,'ja'))}
// 会社グループ（センバ/西若/応援など。人数つきの外部チーム）判定
function baseOf(p){const m=p.match(/^(.+?)(\d+)$/);return m?m[1]:p;}
function isGroup(p){return /\d$/.test(p)||/^(センバ|西若|応援|新興)/.test(p)||p==='+α';}
function dispName(p){return isGroup(p)?baseOf(p):p;}
// 人物一覧（会社グループは人数違いをまとめて1つに）
function peopleDisplay(){const s=new Set();allPeople().forEach(p=>s.add(dispName(p)));return [...s].sort((a,b)=>a.localeCompare(b,'ja'))}
// その日の自社工場出勤者：A=稼働日に現場が無い人／B=平日／日曜は休み・会社グループ・現場・お休みは除外
function factoryList(iso){if(jsWd(iso)===0)return [];const on=onSiteSet(iso),off=offOf(iso),res=[];
  allPeople().forEach(p=>{if(isGroup(p)||on.has(p)||off.has(p))return;const t=tOf(p);
    if(t==='A'){if(isWorkingDay(iso))res.push(p);}else if(t==='B'){if(isWeekdayDate(iso))res.push(p);}});
  return res;}
function weekDates(iso){let s=new Date(iso+'T00:00:00');s.setDate(s.getDate()-jsWd(iso));const out=[];
  const fmtD=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  for(let i=0;i<7;i++){out.push(fmtD(s));s.setDate(s.getDate()+1);}return out;}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1800)}
const PALETTE=["#2563eb","#0891b2","#7c3aed","#db2777","#ea580c","#16a34a","#ca8a04","#dc2626","#0d9488","#4f46e5","#9333ea","#b45309","#475569"];
const siteColors={};let ci=0;
function colorOf(s){if(!siteColors[s]){siteColors[s]=PALETTE[ci%PALETTE.length];ci++}return siteColors[s]}

// ---------- weeks ----------
function weeksOfMonth(){
  const fmtD=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dm=dayMap();
  const days=data.days.filter(d=>monthOf(d.date)===cursor);
  if(!days.length)return[];
  const first=days[0].date,last=days[days.length-1].date;
  let start=new Date(first+'T00:00:00');start.setDate(start.getDate()-jsWd(first));
  let end=new Date(last+'T00:00:00');end.setDate(end.getDate()+(6-jsWd(last)));
  const weeks=[];let cur=new Date(start);
  while(cur<=end){const row=[];for(let i=0;i<7;i++){const iso=fmtD(cur);
    row.push(dm[iso]||{date:iso,weekday:WD[cur.getDay()],assignments:[],_out:monthOf(iso)!==cursor});cur.setDate(cur.getDate()+1);}
    weeks.push(row);}
  return weeks;
}
function weekSites(w){const order=[],seen=new Set();w.forEach(d=>d.assignments.forEach(a=>{if(!seen.has(a.site)){seen.add(a.site);order.push(a.site)}}));return order}

// ---------- render ----------
const main=document.getElementById('main');
function render(){
  if(!cursor)return;
  document.getElementById('curMonth').textContent=cursor.replace('-','年')+'月';
  buildCtx();
  if(view==='site')renderSite();else if(view==='person')renderPerson();else renderFactory();
}
function chipHtml(p,date,loc,ed){return `<span class="chip ${tOf(p)==='C'?'spot':''}" ${ed?`draggable="true" data-person="${esc(p)}" data-date="${date}" data-loc="${esc(loc)}"`:''}>${esc(p)}</span>`;}
function renderSite(){
  const weeks=weeksOfMonth();
  if(!weeks.length){main.innerHTML='<p style="color:#6b7280">この月のデータはありません。'+(role==='editor'?'「取込」から投入できます。':'')+'</p>';return}
  const T=todayIso(),ed=role==='editor';
  let html='';
  if(ed)html+='<div class="dndhint">編集者：マスを<b>クリック</b>で編集／名前を<b>ドラッグ</b>で移動（🏭工場・🏖休みへも、逆向きもOK）／<b>Ctrlを押しながらドラッグ＝コピー</b>（元の日にも残す）／カードの<b>×</b>でその日の現場を削除・PC向け</div>';
  weeks.forEach(w=>{
    const lanes=weekSites(w);
    html+='<div class="week scroll"><div class="wgrid">';
    w.forEach(d=>{const wd=jsWd(d.date);const{d:dd}=ymd(d.date);
      html+=`<div class="dhead ${wd===0?'sun':''} ${wd===6?'sat':''} ${d.date===T?'today':''}">${dd}<span class="wd"> ${WD[wd]}</span></div>`;});
    // 現場レーン
    lanes.forEach(site=>{const c=colorOf(site);
      w.forEach(d=>{const a=d.assignments.find(x=>x.site===site);const t=d.date===T?'today':'';
        const sattr=`data-date="${d.date}" data-loc="${esc(site)}"`;
        if(a){const chips=a.people.map(p=>chipHtml(p,d.date,site,ed)).join('');
          html+=`<div class="lc ${ed?'drop':'ro'} ${t}" ${sattr}><div class="site" style="background:${c}">${ed?`<span class="cardx" data-date="${d.date}" data-site="${esc(site)}" title="この日の現場を削除">×</span>`:''}<span class="nm">${esc(site)}</span>${chips}</div></div>`;}
        else html+=`<div class="lc off ${ed?'drop':'ro'} ${t}" ${sattr}></div>`;});
    });
    // 自社工場レーン
    w.forEach(d=>{const t=d.date===T?'today':'';const fac=d._out?[]:factoryList(d.date);
      const chips=fac.map(p=>chipHtml(p,d.date,FAC,ed)).join('');
      html+=`<div class="lc fac ${ed?'drop':'ro'} ${t}" data-date="${d.date}" data-loc="${FAC}"><div class="facbox2">🏭 自社工場 <b>${fac.length}</b>名</div><div class="facn">${chips||'<span class="count">－</span>'}</div></div>`;});
    // 休みレーン
    w.forEach(d=>{const t=d.date===T?'today':'';const off=d._out?[]:[...offOf(d.date)];
      const chips=off.map(p=>chipHtml(p,d.date,OFF,ed)).join('');
      html+=`<div class="lc rest ${ed?'drop':'ro'} ${t}" data-date="${d.date}" data-loc="${OFF}"><div class="restbox">🏖 休み <b>${off.length}</b></div><div class="facn">${chips||'<span class="count">－</span>'}</div></div>`;});
    html+='</div></div>';
  });
  main.innerHTML=html;
  if(ed){
    main.querySelectorAll('.lc[data-loc]').forEach(el=>el.onclick=(e)=>{if(e.target.classList.contains('chip')||e.target.classList.contains('cardx'))return;openEdit(el.dataset.date);});
    main.querySelectorAll('.cardx').forEach(x=>x.onclick=(e)=>{e.stopPropagation();deleteCard(x.dataset.date,x.dataset.site);});
    wireDnD();
  }
}
// ---------- ドラッグ＆ドロップ（人員の移動・loc＝現場名/__FAC__/__OFF__）----------
let dragSrc=null;
function wireDnD(){
  main.querySelectorAll('.chip[draggable="true"]').forEach(ch=>{
    ch.addEventListener('dragstart',e=>{e.stopPropagation();dragSrc={person:ch.dataset.person,date:ch.dataset.date,loc:ch.dataset.loc};
      e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',ch.dataset.person)}catch(_){}});
    ch.addEventListener('dragend',()=>{dragSrc=null;main.querySelectorAll('.lc.dragover').forEach(x=>x.classList.remove('dragover'));});
  });
  main.querySelectorAll('.lc.drop[data-loc]').forEach(cell=>{
    cell.addEventListener('dragover',e=>{if(!dragSrc)return;e.preventDefault();e.dataTransfer.dropEffect=(e.ctrlKey||e.metaKey)?'copy':'move';cell.classList.add('dragover');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('dragover'));
    cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('dragover');if(!dragSrc)return;
      const src=dragSrc;dragSrc=null;movePerson(src,{date:cell.dataset.date,loc:cell.dataset.loc},e.ctrlKey||e.metaKey);});
  });
}
function locRemove(s,person,loc){if(loc===FAC)return;if(loc===OFF){s.off=s.off.filter(p=>p!==person);return;}
  const a=s.assignments.find(x=>x.site===loc);if(a)a.people=a.people.filter(p=>p!==person);}
function locAdd(s,person,loc){if(loc===FAC)return;if(loc===OFF){if(!s.off.includes(person))s.off.push(person);return;}
  let a=s.assignments.find(x=>x.site===loc);if(!a){a={site:loc,people:[]};s.assignments.push(a);}if(!a.people.includes(person))a.people.push(person);}
async function movePerson(src,tgt,copy){
  if(!src)return; if(src.date===tgt.date&&src.loc===tgt.loc)return;
  const isSite=tgt.loc!==FAC&&tgt.loc!==OFF, doCopy=!!copy&&isSite;
  const dm=dayMap(),state={};
  const st=date=>{if(!(date in state)){const d=dm[date];state[date]={assignments:d?JSON.parse(JSON.stringify(d.assignments)):[],off:d&&d.off?[...d.off]:[]};}return state[date];};
  if(!doCopy)locRemove(st(src.date),src.person,src.loc);
  locAdd(st(tgt.date),src.person,tgt.loc);
  const changes={};for(const date in state)changes[date]=state[date];
  await applyDayChanges(changes, doCopy?`${src.person} をコピー`:tgt.loc===FAC?`${src.person} を工場へ`:tgt.loc===OFF?`${src.person} をお休みへ`:`${src.person} を移動`);
}
// ---------- 変更の適用＆元に戻す ----------
let undoStack=[];
async function writeDay(date,val){
  const asg=(val&&val.assignments)?val.assignments.filter(a=>a.people.length>0):[];
  const off=(val&&val.off)?val.off:[];
  if(asg.length||off.length){const o={date,weekday:WD[jsWd(date)],assignments:asg};if(off.length)o.off=off;await setDoc(doc(db,'days',date),o);}
  else await deleteDoc(doc(db,'days',date));
}
async function applyDayChanges(changes,label){
  const dm=dayMap(),before=[];
  for(const date in changes){const d=dm[date];before.push({date,assignments:d?JSON.parse(JSON.stringify(d.assignments)):null,off:d&&d.off?[...d.off]:null});}
  try{for(const date in changes)await writeDay(date,changes[date]);undoStack.push(before);updateUndoBtn();if(label)toast(label);}
  catch(e){alert('保存に失敗：'+e.message);}
}
async function doUndo(){const before=undoStack.pop();if(!before)return;
  try{for(const b of before)await writeDay(b.date,{assignments:b.assignments||[],off:b.off||[]});updateUndoBtn();toast('元に戻しました');}
  catch(e){alert('戻すのに失敗：'+e.message);}}
function updateUndoBtn(){const b=document.getElementById('undo');if(b)b.style.display=(role==='editor'&&undoStack.length)?'':'none';}
async function deleteCard(date,site){const d=dayMap()[date];if(!d)return;
  await applyDayChanges({[date]:{assignments:d.assignments.filter(a=>a.site!==site),off:d.off||[]}},`${site}（${date}）を削除`);}
async function deleteSiteWeek(site,iso){const dm=dayMap(),changes={};
  weekDates(iso).forEach(date=>{const d=dm[date];if(d&&d.assignments.some(a=>a.site===site))changes[date]={assignments:d.assignments.filter(a=>a.site!==site),off:d.off||[]};});
  if(Object.keys(changes).length)await applyDayChanges(changes,`${site} を今週分まとめて削除`);}
function personDay(iso){const d=dayMap()[iso],sel=curPerson;
  if(d){const sites=d.assignments.filter(a=>a.people.some(p=>dispName(p)===sel)).map(a=>a.site);if(sites.length)return{state:'site',sites};
    if((d.off||[]).some(p=>dispName(p)===sel))return{state:'rest'};}
  if(isGroup(sel))return{state:'none'};
  const t=tOf(sel);
  if(t==='A')return (jsWd(iso)!==0&&isWorkingDay(iso))?{state:'factory'}:{state:'none'};
  if(t==='B')return isWeekdayDate(iso)?{state:'factory'}:{state:'rest'};
  return{state:'rest'};}
function renderPerson(){
  if(!curPerson){main.innerHTML='<p style="color:#6b7280">上の人員から1名選んでください。</p>';return}
  const weeks=weeksOfMonth(),T=todayIso();let nSite=0,nFac=0,nRest=0;
  const plabel=isGroup(curPerson)?'会社・応援（現場のみ）':TYPES[tOf(curPerson)];
  let html=`<div class="week"><div class="week-h">${esc(curPerson)} さんの予定（${plabel}）</div><div class="grid">`;
  html+=WD.map((x,i)=>`<div class="mh ${i===0?'sun':''} ${i===6?'sat':''}">${x}</div>`).join('');
  weeks.forEach(w=>w.forEach(d=>{const{d:dd}=ymd(d.date);const wd=jsWd(d.date);
    const cls=['cellbox',wd===0?'sun':'',wd===6?'sat':'',d.date===T?'today':''].join(' ');
    const r=d._out?{state:'out'}:personDay(d.date);let body='';
    if(r.state==='site'){body=r.sites.map(s=>`<div class="badge" style="background:${colorOf(s)}">${esc(s)}</div>`).join('');nSite++;}
    else if(r.state==='factory'){body='<div class="badge factory">工場</div>';nFac++;}
    else if(r.state==='rest'){body='<div class="badge rest">休</div>';nRest++;}
    else if(r.state==='none')body='<span class="count">－</span>';
    html+=`<div class="${cls}"><div class="dnum"><span>${dd}<span class="wd"> ${WD[wd]}</span></span></div>${body}</div>`;}));
  html+='</div></div>';
  html=`<div class="summary"><div>現場 <b>${nSite}</b>日</div><div style="color:var(--factory)">工場 <b>${nFac}</b>日</div><div style="color:var(--rest)">休 <b>${nRest}</b>日</div></div>`+html;
  main.innerHTML=html;
}
function renderFactory(){
  const weeks=weeksOfMonth(),T=todayIso();
  if(!weeks.length){main.innerHTML='<p style="color:#6b7280">この月のデータはありません。</p>';return}
  let html=`<div class="note">「工場出勤」＝A(社員・常駐)で現場が無い日＋B(工場のみ・常駐)の平日。現場の人・お休みの人・C(外注)は除外。</div>`;
  html+='<div class="week"><div class="grid">';
  html+=WD.map((x,i)=>`<div class="mh ${i===0?'sun':''} ${i===6?'sat':''}">${x}</div>`).join('');
  weeks.forEach(w=>w.forEach(d=>{const{d:dd}=ymd(d.date);const wd=jsWd(d.date);
    const cls=['cellbox',wd===0?'sun':'',wd===6?'sat':'',d.date===T?'today':''].join(' ');let body='';
    if(!d._out){const fac=factoryList(d.date);
      if(fac.length)body=`<div class="badge factory">工場 ${fac.length}名</div><div class="names">${fac.map(esc).join('・')}</div>`;
      else body=`<span class="count">－</span>`;}
    html+=`<div class="${cls}"><div class="dnum"><span>${dd}<span class="wd"> ${WD[wd]}</span></span></div>${body}</div>`;}));
  html+='</div></div>';main.innerHTML=html;
}
function buildCtx(){const ctx=document.getElementById('ctx');
  if(view==='person'){const ppl=peopleDisplay();if((!curPerson||!ppl.includes(curPerson))&&ppl.length)curPerson=ppl[0];
    ctx.innerHTML=ppl.map(p=>`<button class="ptag ${p===curPerson?'on':''} ${(!isGroup(p)&&tOf(p)==='C')?'spot':''}" data-p="${esc(p)}">${esc(p)}</button>`).join('');
    ctx.querySelectorAll('.ptag').forEach(b=>b.onclick=()=>{curPerson=b.dataset.p;render()});
  }else ctx.innerHTML='';}

// ---------- edit ----------
let editDate=null;
function openEdit(date){
  if(role!=='editor')return;
  editDate=date;const d=dayMap()[date]||{date,assignments:[],off:[]};
  document.getElementById('ovTitle').textContent=`${date}（${WD[jsWd(date)]}）の予定`;
  const body=document.getElementById('ovBody');
  body.innerHTML=`<div class="note">現場名と人員（「、」区切り）を入力。空欄で保存すると削除。会社＋人数表記OK（例：センバ4）。</div><div id="arows"></div><button class="lnk" id="addRow">＋ 現場を追加</button>
    <div class="arow" style="margin-top:12px;border-color:#fdba74"><label>🏖 お休み（、区切り）— この日休む人</label><input id="offIn" value="${esc((d.off||[]).join('、'))}"></div>`;
  const rows=body.querySelector('#arows');
  function addRow(site='',people='',existing=false){const div=document.createElement('div');div.className='arow';
    div.innerHTML=`<label>現場名</label><input class="s" value="${esc(site)}"><label>人員（、区切り）</label><input class="p" value="${esc(people)}">`+
      (existing&&site?`<button class="lnk" data-week="1" style="margin-top:6px;color:#b91c1c">🗑 この現場を今週分まとめて削除</button>`:'');
    rows.appendChild(div);
    const wb=div.querySelector('[data-week]');if(wb)wb.onclick=()=>{if(confirm(`「${site}」を、この週（日〜土）の全日からまとめて削除します。よろしいですか？`)){deleteSiteWeek(site,editDate);closeOv();}};}
  d.assignments.forEach(a=>addRow(a.site,a.people.join('、'),true));addRow();addRow();
  body.querySelector('#addRow').onclick=()=>addRow();
  document.getElementById('ov').classList.add('on');
}
document.getElementById('ovSave').onclick=async()=>{
  const rows=[...document.querySelectorAll('#arows .arow')];const asg=[];
  rows.forEach(r=>{const s=r.querySelector('.s').value.trim();const p=r.querySelector('.p').value.trim();
    if(s)asg.push({site:s,people:p?p.replace(/，/g,'、').split('、').map(x=>x.trim()).filter(Boolean):[]});});
  const offv=(document.getElementById('offIn').value||'').trim();
  const off=offv?offv.replace(/，/g,'、').split('、').map(x=>x.trim()).filter(Boolean):[];
  closeOv();
  await applyDayChanges({[editDate]:{assignments:asg,off}},'保存しました');
};
function closeOv(){document.getElementById('ov').classList.remove('on')}
document.getElementById('ovCancel').onclick=closeOv;
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')closeOv()};

// ---------- 人員設定 ----------
document.getElementById('gear').onclick=()=>{
  const b=document.getElementById('ovsBody');
  function draw(){
    b.innerHTML=`<div class="note">A＝社員・常駐（現場＋工場／現場が無い日は工場）。B＝常駐（工場のみ・土日休）。C＝外注（現場のみ／現場が無い日は休）。未登録は名前から推定します。</div>
      <div style="display:flex;gap:6px;margin-bottom:12px"><input id="newp" placeholder="人員を追加（例：奥井(幸)）" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:7px">
      <select id="newt">${Object.entries(TYPES).map(([k,v])=>`<option value="${k}">${k}</option>`).join('')}</select><button class="btn gray" id="addp">追加</button></div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:6px">※センバ・西若・応援などの会社グループは「人数つきチーム」として自動判定（現場のみ）。ここには表示しません。</div>`+
      allPeople().filter(p=>!isGroup(p)).map(p=>`<div class="typesel"><span>${esc(p)}</span><select data-p="${esc(p)}">${Object.entries(TYPES).map(([k,v])=>`<option value="${k}" ${tOf(p)===k?'selected':''}>${v}</option>`).join('')}</select></div>`).join('');
    b.querySelectorAll('select[data-p]').forEach(s=>s.onchange=async()=>{const np={...ptype};np[s.dataset.p]=s.value;ptype=np;
      try{await setDoc(doc(db,'config','app'),{ptype:np},{merge:true});toast('種別を保存');}catch(e){alert('保存失敗：'+e.message);}});
    b.querySelector('#addp').onclick=async()=>{const name=b.querySelector('#newp').value.trim();if(!name)return;
      const np={...ptype};np[name]=b.querySelector('#newt').value;ptype=np;
      try{await setDoc(doc(db,'config','app'),{ptype:np},{merge:true});toast('追加しました');draw();}catch(e){alert('保存失敗：'+e.message);}};
  }
  draw();
  document.getElementById('ovs').classList.add('on');
};
document.getElementById('ovsClose').onclick=()=>document.getElementById('ovs').classList.remove('on');
document.getElementById('ovs').onclick=e=>{if(e.target.id==='ovs')document.getElementById('ovs').classList.remove('on')};

// ---------- メンバー管理 ----------
document.getElementById('memberBtn').onclick=()=>{
  const b=document.getElementById('ovmBody');
  function listHtml(title,arr,key){return `<h4 style="margin:10px 0 4px">${title}</h4>`+
    arr.map(em=>`<div class="memrow"><span class="em">${esc(em)}</span><button class="lnk" data-del="${key}" data-em="${esc(em)}">削除</button></div>`).join('')+
    `<div style="display:flex;gap:6px;margin-top:6px"><input id="add_${key}" placeholder="メールを追加" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:7px"><button class="btn gray" data-add="${key}">追加</button></div>`;}
  b.innerHTML=`<div class="note">編集者＝書込み可。閲覧者＝見るだけ。ここに登録したメールの人が、同じメールでログインすると入れます（先にFirebaseでアカウント作成が必要）。</div>`+
    listHtml('編集者','editors'===0?[]:editors,'editors')+listHtml('閲覧者',viewers,'viewers');
  async function commit(next){try{await setDoc(doc(db,'config','app'),next,{merge:true});toast('メンバーを更新');}catch(e){alert('更新失敗：'+e.message);}}
  b.querySelectorAll('[data-del]').forEach(x=>x.onclick=()=>{const k=x.dataset.del;const arr=(k==='editors'?editors:viewers).filter(e=>e!==x.dataset.em);commit({[k]:arr});});
  b.querySelectorAll('[data-add]').forEach(x=>x.onclick=()=>{const k=x.dataset.add;const v=document.getElementById('add_'+k).value.trim().toLowerCase();
    if(!v)return;const arr=[...new Set([...(k==='editors'?editors:viewers),v])];commit({[k]:arr});});
  document.getElementById('ovm').classList.add('on');
};
document.getElementById('ovmClose').onclick=()=>document.getElementById('ovm').classList.remove('on');
document.getElementById('ovm').onclick=e=>{if(e.target.id==='ovm')document.getElementById('ovm').classList.remove('on')};

// ---------- 取込（JSON） ----------
document.getElementById('importBtn').onclick=()=>{
  const b=document.getElementById('oviBody');
  b.innerHTML=`<div class="note">JSONファイルを選ぶとFirestoreへ反映します（同じ日は上書き）。実データは端末から直接送られ、公開コードには残りません。<br>・<b>schedule.json</b>（予定）…日ごとに反映<br>・<b>roster.json</b>（人員構成 ptype）…人の種別A/B/Cを反映</div>
    <button class="btn primary" id="pick">ファイルを選択</button><div id="impProg" style="margin-top:10px;font-size:13px"></div>`;
  b.querySelector('#pick').onclick=()=>document.getElementById('fileInput').click();
  document.getElementById('ovi').classList.add('on');
};
document.getElementById('fileInput').onchange=async(e)=>{
  const f=e.target.files[0];if(!f)return;const prog=document.getElementById('impProg');
  try{
    const json=JSON.parse(await f.text());
    if(json.ptype&&typeof json.ptype==='object'){
      const np={...ptype,...json.ptype};ptype=np;
      await setDoc(doc(db,'config','app'),{ptype:np},{merge:true});
      prog.textContent=`人員構成：${Object.keys(json.ptype).length}名の種別を反映しました。`;toast('人員構成を取込');
    }
    const days=json.days||(Array.isArray(json)?json:null);
    if(Array.isArray(days)){
      let n=0;for(const d of days){if(!d.date)continue;
        const o={date:d.date,weekday:d.weekday||WD[jsWd(d.date)],assignments:d.assignments||[]};if(d.off&&d.off.length)o.off=d.off;
        await setDoc(doc(db,'days',d.date),o);
        n++;prog.textContent=`取込中… ${n}/${days.length}`;}
      prog.textContent=`完了：予定${n}件を反映しました。`;toast('取込完了');
    }else if(!json.ptype)throw new Error('days配列もptypeも見つかりません');
  }catch(err){prog.textContent='失敗：'+err.message;}
  e.target.value='';
};
document.getElementById('oviClose').onclick=()=>document.getElementById('ovi').classList.remove('on');
document.getElementById('ovi').onclick=e=>{if(e.target.id==='ovi')document.getElementById('ovi').classList.remove('on')};

// ---------- nav / tabs ----------
document.getElementById('prev').onclick=()=>{cursor=shiftMonth(cursor,-1);render()};
document.getElementById('next').onclick=()=>{cursor=shiftMonth(cursor,1);render()};
document.getElementById('today').onclick=()=>{const t=todayIso().slice(0,7);const m=monthsList();cursor=m.includes(t)?t:(m[0]||t);render()};
document.getElementById('undo').onclick=doUndo;
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');view=b.dataset.v;
  if(view==='person'&&!curPerson)curPerson=peopleDisplay()[0];render();});
